# Hunger Run 2026 — Apache2 VirtualHost
# Domain: meow.ice-solution.hk
# SSL: Cloudflare Flexible（用戶 ↔ Cloudflare HTTPS；Cloudflare ↔ 源站 HTTP :80）
#
# 啟用方式（Ubuntu/Debian 範例）：
#   sudo a2enmod proxy proxy_http proxy_wstunnel headers
#   sudo cp deploy/apache/meow.ice-solution.hk.conf /etc/apache2/sites-available/
#   sudo a2ensite meow.ice-solution.hk.conf
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# 需要 Apache 2.4.47+（upgrade=websocket）。舊版請用下方「備用 Rewrite」註解區塊。
#
# Cloudflare：Network → WebSockets 必須 On
#
# Node（建議 pm2 / systemd，只聽 localhost）：
#   cd /var/www/weow_server
#   npm run build
#   NODE_ENV=production npm start
#
# Production .env 重點：
#   PORT=3001
#   HOST=127.0.0.1
#   NODE_ENV=production
#   CLIENT_URL=https://meow.ice-solution.hk

<VirtualHost *:80>
    ServerName meow.ice-solution.hk

    ErrorLog  ${APACHE_LOG_DIR}/meow.ice-solution.hk-error.log
    CustomLog ${APACHE_LOG_DIR}/meow.ice-solution.hk-access.log combined

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyRequests Off
    ProxyPreserveHost On
    ProxyTimeout 300

    # Socket.io：同一 http proxy 處理 polling + WebSocket upgrade（Apache 2.4.47+）
    # 必須寫在 ProxyPass / 之前
    ProxyPass        /socket.io/ http://127.0.0.1:3001/socket.io/ upgrade=websocket retry=0
    ProxyPassReverse /socket.io/ http://127.0.0.1:3001/socket.io/

    ProxyPass        / http://127.0.0.1:3001/
    ProxyPassReverse / http://127.0.0.1:3001/

    # --- 備用：Apache < 2.4.47 時刪上面 ProxyPass /socket.io/ 兩行，改用以下 Rewrite ---
    # RewriteEngine On
    # RewriteCond %{HTTP:Upgrade} websocket [NC]
    # RewriteCond %{HTTP:Connection} upgrade [NC]
    # RewriteRule ^/socket.io/(.*)$ ws://127.0.0.1:3001/socket.io/$1 [P,L]
    # RewriteCond %{HTTP:Upgrade} !websocket [NC]
    # RewriteRule ^/socket.io/(.*)$ http://127.0.0.1:3001/socket.io/$1 [P,L]
    # ProxyPassReverse /socket.io/ ws://127.0.0.1:3001/socket.io/
</VirtualHost>
